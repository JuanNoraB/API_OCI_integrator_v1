services:

  api:
    build: .
    expose:
      - "8000"        # solo visible internamente, nginx lo llama por nombre "api"
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro   # monta los certs del host (read-only)
    depends_on:
      - api
    restart: unless-stopped
