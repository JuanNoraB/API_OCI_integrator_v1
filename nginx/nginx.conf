server {
    listen 80;
    server_name integratorapi.blacklinefpa.com;
    return 301 https://$host$request_uri;    # redirige todo HTTP → HTTPS
}

server {
    listen 443 ssl;
    server_name integratorapi.blacklinefpa.com;

    ssl_certificate     /etc/letsencrypt/live/integratorapi.blacklinefpa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/integratorapi.blacklinefpa.com/privkey.pem;

    location / {
        proxy_pass         http://api:8000;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }
}
